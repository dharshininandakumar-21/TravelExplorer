<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — TravelExplorer</title>
<script>
(function(){try{var t=localStorage.getItem('te-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();
</script>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header>
  <div class="container header-content">
    <a href="index.html" class="logo"><i class="fas fa-globe-americas"></i> TravelExplorer</a>
    <nav id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="destinations"><i class="fas fa-map-marked-alt"></i> Destinations</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
      <a href="register.html" class="active"><i class="fas fa-user-plus"></i> Register</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </nav>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="theme-toggle" id="themeToggle" title="Toggle dark / light theme">
        <div class="theme-toggle-track">
          <div class="theme-toggle-thumb"><i class="theme-icon fas fa-moon"></i></div>
        </div>
      </div>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card anim" style="max-width:560px;">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-suitcase-rolling"></i></div>
      <h2>Join TravelExplorer</h2>
      <p>Create your account and start your adventure today</p>
    </div>

    <form action="register" method="post" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName"><i class="fas fa-user"></i> First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="First name" required>
        </div>
        <div class="form-group">
          <label for="lastName"><i class="fas fa-user"></i> Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required>
          <span class="password-toggle" onclick="togglePw('password', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="form-group">
          <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
          <span class="password-toggle" onclick="togglePw('confirmPassword', this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox">
          <input type="checkbox" name="terms" required>
          I agree to the <a href="#" class="terms-link" style="color:var(--accent);margin-left:3px;">Terms &amp; Conditions</a>
        </label>
      </div>

      <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Create Account</button>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="auth-link">Sign in here</a></p>
      </div>
    </form>
  </div>
</div>

<script src="js/theme.js"></script>
<script>
function togglePw(id, el) {
  const input = document.getElementById(id);
  const icon = el.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
